        <h1 id="如何成为有效学习的高手">《如何成为有效学习的高手》</h1>
<h2 id="前言">前言</h2>
<p>高效学习的定义是找到适合自己的学习方法,在最短的时间里能够集中注意力,以解决生活或工作中的一个任务为目的着手学习. 需要勤加练习,必要的时候要向名师求助!</p>
<p>这其中有七个关键点:</p>
<ol>
<li>适合自己</li>
<li>学习方法</li>
<li>最短时间</li>
<li>注意力</li>
<li>解决任务</li>
<li>设定目标</li>
<li>名师</li>
</ol>

      if (section.offsetTop <= fromTop) {
        if (nextSection) {
          if (nextSection.offsetTop > fromTop) {
            link.classList.add("current");
          } else {
            link.classList.remove("current");    
          }
        } else {
          link.classList.add("current");
        }
      } else {
        link.classList.remove("current");
      }
    });
  });
